name: CI

# Why this workflow exists: PRs #26 and #28 both broke
# `Scripts/package-dmg.sh` because the diagnostic they introduced
# (`@Sendable` capture of a `var`; `public struct` without explicit
# `Sendable` conformance) only fires when Swift 6's strict-concurrency
# analyser runs to completion, which `swift build` (debug) skips by
# default. Both PRs reviewed green on dev hosts that hadn't run
# `swift build -c release` locally. This workflow is the safety net
# for that — every push and every PR builds in release mode on a
# hosted runner.
#
# Runner: `macos-15` (Apple Silicon). Knit is macOS-only: the codebase
# uses Metal, F_NOCACHE, arm64 CRC32, mmap-aliased MTLBuffers, and
# `.macOS(.v15)` in Package.swift. Intel runners would not compile.
# `macos-latest` would also work but pinning a major version keeps
# GitHub's runner upgrades from quietly turning the CI red.
#
# Scope of this CI: release-mode build only. `swift test` is
# intentionally NOT in this workflow, by design — not pending a
# fix.
#
# Why no test job:
#   - `macos-15` GitHub-hosted runners are M1 with 3 vCPUs, roughly
#     5–6× slower than the dev hardware (M5 Max) for this codebase.
#     The full suite that runs in ~55 s locally took >11 minutes on
#     the runner in PR #88's cancelled-mid-run attempt.
#   - GitHub Actions bills macOS minutes at a **10× multiplier** vs
#     Linux. An 11-minute test job = ~110 billable minutes per push.
#     Across a typical PR (push, fix, push again) this trivially
#     reaches tens of dollars per merge, which is not justifiable
#     for a suite the developer already runs locally in under a
#     minute via `./Scripts/run-tests.sh`.
#   - Tests do not provide an incremental safety win over the local
#     run. The dev-side workflow IS the test gate; CI's value is
#     catching the *one* thing local debug builds miss — the
#     strict-concurrency analyser, which only runs to completion in
#     release mode (PRs #26 and #28 broke release builds while
#     reviewing green on debug-only dev hosts).
#
# Do NOT add a `swift test` job to this workflow without a
# documented change of facts (e.g. self-hosted Apple Silicon
# runners, a free-tier macOS alternative, or a much faster test
# subset). PR #88 attempted this and was closed as the wrong call.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A single concurrency group per ref keeps the queue clean: a force-push
# to a PR cancels the previous run instead of letting both finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: swift build -c release (strict-concurrency complete)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      # The strict-concurrency analyser only runs to completion in
      # release mode. Failing here on a `@Sendable` capture diagnostic
      # is the whole point of this job.
      - name: Build release
        run: swift build -c release

  # No `swift test` job here, by design. See the file header for
  # the cost reasoning (macOS Actions 10× billing, ~110 billable
  # minutes per push observed in PR #88). Tests stay local-only
  # via `./Scripts/run-tests.sh`.
