name: CI

# Why this workflow exists: PRs #26 and #28 both broke
# `Scripts/package-dmg.sh` because the diagnostic they introduced
# (`@Sendable` capture of a `var`; `public struct` without explicit
# `Sendable` conformance) only fires when Swift 6's strict-concurrency
# analyser runs to completion, which `swift build` (debug) skips by
# default. Both PRs reviewed green on dev hosts that hadn't run
# `swift build -c release` locally. This workflow is the safety net
# for that — every push and every PR builds in release mode on a
# hosted runner.
#
# Runner: `macos-15` (Apple Silicon). Knit is macOS-only: the codebase
# uses Metal, F_NOCACHE, arm64 CRC32, mmap-aliased MTLBuffers, and
# `.macOS(.v15)` in Package.swift. Intel runners would not compile.
# `macos-latest` would also work but pinning a major version keeps
# GitHub's runner upgrades from quietly turning the CI red.
#
# Two jobs:
#   1. `build-release` (since PR #44) — `swift build -c release` to
#      catch the Swift-6 strict-concurrency footgun that the debug
#      build silently lets through.
#   2. `test` (this PR) — `./Scripts/run-tests.sh`. Tests were initially
#      blocked by a macOS 26 Tahoe firmlink bug in `FileWalker.enumerate`
#      (`URL.resolvingSymlinksInPath()` no longer resolves `/tmp` →
#      `/private/tmp` on the default APFS volume layout). PR #45 fixed
#      it via `realpath(3)`, which is what unblocked turning this on.
#
# `Scripts/run-tests.sh` exists because `Package.swift` intentionally
# omits the test target so distribution clones build cleanly in Xcode.
# The script temporarily swaps in a manifest that declares the
# `KnitCoreTests` target, runs `swift test`, then restores the
# original manifest. The CI job invokes the same script so what
# devs run locally is exactly what CI runs.
#
# Local prerequisite: full Xcode (XCTest framework). Command Line
# Tools alone are not enough — `swift test` will fail with
# "no such module 'XCTest'". macOS GitHub runners have full Xcode
# pre-installed so CI is unaffected.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A single concurrency group per ref keeps the queue clean: a force-push
# to a PR cancels the previous run instead of letting both finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: swift build -c release (strict-concurrency complete)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      # The strict-concurrency analyser only runs to completion in
      # release mode. Failing here on a `@Sendable` capture diagnostic
      # is the whole point of this job.
      - name: Build release
        run: swift build -c release

  test:
    name: ./Scripts/run-tests.sh
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version
          xcode-select -p

      # Tests run via the dev script so CI exercises the same
      # manifest-swap path developers use locally. The script
      # restores Package.swift on exit (trap), so a failed run
      # leaves the working tree clean.
      - name: Run tests
        run: ./Scripts/run-tests.sh
